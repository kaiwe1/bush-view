name: Build Bush View (Windows)

# 当你推送以 v 开头的标签时触发，如 v1.0.1
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Publish to GitHub Releases
        # 这个命令会运行 package -> make -> publish(上传)
        run: npm run publish
        env:
          # GitHub 自动提供的 Token，无需手动设置 Secret
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
